name: Render Video

on:
  push:
    branches:
      - main
    paths:
      - 'public/assets/data.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        run: |
          npx remotion render ReelAutomationScene output/video.mp4 \
          --codec h264 \
          --crf 16 \
          --pixel-format yuv420p \
          --audio-codec mp3

      - name: Reset Data, Clean Audio & Save Video
        run: |
          git config --global user.name "Reel-Bot"
          git config --global user.email "bot@github.com"

          # 1. تصفير محتوى ملف الداتا تماماً
          echo "[]" > public/assets/data.json

          # 2. مسح كل ملفات الصوت mp3 من فولدر Elevsound
          rm -f public/assets/Elevsound/*.mp3 || echo "No audio files found to delete"

          # 3. إضافة التغييرات (الفيديو الجديد + تصفير الداتا + حذف الصوت)
          git add -f output/video.mp4
          git add public/assets/data.json
          git add public/assets/Elevsound/*.mp3 || echo "Nothing to add in Elevsound"

          # 4. الرفع النهائي مع تجاوز التشغيل التلقائي [skip ci]
          git commit -m "Video Generated, Audio Cleaned & Data Reset [skip ci]" || echo "No changes to commit"
          git push
          

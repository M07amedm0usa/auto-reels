name: 🎬 Render Reel

on:
  push:
    branches:
      - main
    paths:
      - 'public/assets/data.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    # منع الـ Infinite Loop لو الكوميت جاي من البوت
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    timeout-minutes: 40

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Node 20 ─────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Install deps ────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 4. System deps for Chromium ────────────────────────
      - name: Install Chromium system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libxkbcommon0 libxdamage1 libgbm1 \
            libasound2 libpangocairo-1.0-0 libxss1 \
            libgtk-3-0 --no-install-recommends

      # ── 5. Render Video ────────────────────────────────────
      - name: Render video
        run: |
          mkdir -p output
          # استخدام concurrency=2 لمنع الـ OOM Crash على سيرفرات GitHub
          npx remotion render \
            src/index.ts \
            ReelAutomationScene \
            output/video.mp4 \
            --concurrency=2 \
            --gl=swiftshader \
            --log=verbose

      # ── 6. Reset Data, Clean Audio & Save Video ────────────
      - name: Reset Data, Clean Audio & Save Video
        run: |
          git config --global user.name "Reel-Bot"
          git config --global user.email "bot@github.com"

          # 1. تصفير محتوى ملف الداتا تماماً
          echo "[]" > public/assets/data.json

          # 2. مسح كل ملفات الصوت mp3 من فولدر Elevsound
          rm -f public/assets/Elevsound/*.mp3 || echo "No audio files found to delete"

          # 3. إضافة التغييرات (الفيديو الجديد + تصفير الداتا + حذف الصوت)
          git add -f output/video.mp4
          git add public/assets/data.json
          git add public/assets/Elevsound/*.mp3 || echo "Nothing to add in Elevsound"

          # 4. الرفع النهائي مع تجاوز التشغيل التلقائي [skip ci]
          git commit -m "Video Generated, Audio Cleaned & Data Reset [skip ci]" || echo "No changes to commit"
          git push

      # ── 7. Upload artifact (7 days) ────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reel-output-${{ github.run_number }}
          path: output/video.mp4
          retention-days: 7
          

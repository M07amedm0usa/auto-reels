name: Render Video

on:
  push:
    branches:
      - main
    paths:
      - 'public/assets/data.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        run: |
          npx remotion render ReelAutomationScene output/video.mp4 \
          --codec h264 \
          --crf 16 \
          --pixel-format yuv420p \
          --audio-codec mp3

      - name: Reset Data & Save Video
        run: |
          git config --global user.name "Reel-Bot"
          git config --global user.email "bot@github.com"

          # 1. تصفير محتوى الملف تماماً (بدل المسح عشان الكود ميعلقش)
          echo "[]" > public/assets/data.json

          # 2. إضافة الفيديو للمستودع وتحديث الداتا المصفرة
          git add -f output/video.mp4
          git add public/assets/data.json

          # 3. الرفع مع تجاوز التشغيل التلقائي
          git commit -m "Video Generated & Data Reset for n8n [skip ci]" || echo "No changes"
          git push
          

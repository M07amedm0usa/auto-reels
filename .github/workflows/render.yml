name: 🎬 Render Reel

on:
  push:
    paths:
      - 'public/assets/data.json'
  workflow_dispatch:
    inputs:
      template:
        description: 'Template override (blank = random)'
        required: false
        default: ''

jobs:
  render:
    # [FIX CRITICAL] ubuntu-22.04 بدل ubuntu-latest — يحل مشكلة libasound2 في Ubuntu 24.04
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Node 20 ─────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # [FIX CRITICAL] cache: 'npm' بيفشل لو مافيش package-lock.json في الـ repo
          # ارفع package-lock.json أو احذف السطر ده
          # cache: 'npm'

      # ── 3. Install deps ────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 4. System deps for Chromium ────────────────────────
      # [FIX CRITICAL] libasound2 — الاسم الصح على Ubuntu 22.04
      - name: Install Chromium system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libxkbcommon0 libxdamage1 libgbm1 \
            libasound2 libpangocairo-1.0-0 libxss1 \
            libgtk-3-0 --no-install-recommends

      # ── 5. Pick random template ────────────────────────────
      - name: Pick template
        id: tmpl
        run: |
          INPUT="${{ github.event.inputs.template }}"
          TEMPLATES=("terminal" "notebook" "cinematic" "splitview")
          if [ -n "$INPUT" ]; then
            CHOSEN="$INPUT"
          else
            IDX=$((RANDOM % ${#TEMPLATES[@]}))
            CHOSEN="${TEMPLATES[$IDX]}"
          fi
          echo "name=$CHOSEN" >> "$GITHUB_OUTPUT"
          echo "✅ Template: $CHOSEN"

      # ── 6. Inject template into every scene ───────────────
      # [SUGGESTION] يمكن استبدال Node بـ jq لكن Node أوضح وأكثر مرونة
      - name: Inject template into data.json
        env:
          TMPL: ${{ steps.tmpl.outputs.name }}
        run: |
          node --input-type=module << 'EOF'
          import fs from 'fs';
          const tmpl = process.env.TMPL;
          const raw  = fs.readFileSync('public/assets/data.json', 'utf8');
          let data   = JSON.parse(raw);
          const scenes = Array.isArray(data) ? data : data.scenes;
          const updated = scenes.map(s => ({
            ...s,
            // intro ممكن يفضل template بتاعه المحدد — الباقي كلهم ياخدوا الـ chosen template
            template: (s.type === 'intro' && s.template) ? s.template : tmpl,
          }));
          const out = Array.isArray(data) ? updated : { ...data, scenes: updated };
          fs.writeFileSync('public/assets/data.json', JSON.stringify(out, null, 2));
          console.log(`Injected "${tmpl}" into ${updated.length} scenes`);
          EOF

      # ── 7. Render ──────────────────────────────────────────
      - name: Render video
        env:
          TMPL: ${{ steps.tmpl.outputs.name }}
        run: |
          TS=$(date +%Y%m%d_%H%M%S)
          OUTFILE="output/reel_${TMPL}_${TS}.mp4"
          mkdir -p output

          npx remotion render \
            src/index.ts \
            ReelAutomationScene \
            "$OUTFILE" \
            --gl=swiftshader \
            --log=verbose

          echo "OUT=$OUTFILE" >> "$GITHUB_ENV"
          echo "✅ Done: $OUTFILE"

      # ── 8. Upload artifact (7 days) ────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reel-${{ steps.tmpl.outputs.name }}-${{ github.run_number }}
          path: output/*.mp4
          retention-days: 7

      # ── 9. (Optional) Upload to Google Drive ──────────────
      # فعّله لو عندك credentials في Secrets
      # - name: Upload to Drive
      #   uses: adityak74/google-drive-upload-git-action@main
      #   with:
      #     credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
      #     filename: ${{ env.OUT }}
      #     folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
      #     name: reel_${{ steps.tmpl.outputs.name }}_${{ github.run_number }}.mp4
      #     overwrite: false

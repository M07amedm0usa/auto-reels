name: Render Video

on:
  # هيشتغل أوتوماتيك بس لو حصل تعديل في ملف الداتا ده
  push:
    branches:
      - main
    paths:
      - 'public/assets/data.json'
  
  # هيسمحلك تشغله يدوي من زرار Run workflow في صفحة GitHub
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        # أمر الريندر بإعدادات الجودة العالية لمقاسات الريلز
        run: |
          npx remotion render HelloWorld output/video.mp4 \
          --codec h264 \
          --crf 16 \
          --pixel-format yuv420p \
          --audio-codec mp3

      - name: Upload Video
        # رفع الفيديو النهائي عشان تحمله
        uses: actions/upload-artifact@v4
        with:
          name: Final-Reel
          path: output/video.mp4
          

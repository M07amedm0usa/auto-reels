name: Render Video
on: [push, workflow_dispatch]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Render Video
        # HelloWorld هو اسم الـ Composition الافتراضي في القالب بتاعك
        run: npx remotion render HelloWorld output/video.mp4

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
            name: Final-Reel
            path: output/video.mp4
            

name: 🎬 Render Reel

on:
  push:
    branches:
      - main
    paths:
      - 'public/assets/data.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    # [FIX] تثبيت إصدار أوبونتو على 22.04 لتجنب مشاكل توافق حزم Chromium
    runs-on: ubuntu-22.04
    
    # [CRITICAL] منع الـ Infinite Loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libxkbcommon0 libxdamage1 libgbm1 \
            libasound2 libpangocairo-1.0-0 libxss1 \
            libgtk-3-0 --no-install-recommends

      - name: Render video
        run: |
          mkdir -p output
          # [PERFORMANCE] concurrency=2 لمنع استهلاك الميموري بالكامل
          npx remotion render \
            src/index.ts \
            ReelAutomationScene \
            output/video.mp4 \
            --concurrency=2 \
            --gl=swiftshader \
            --log=verbose

      - name: Reset Data, Clean Audio & Save Video
        run: |
          git config --global user.name "Reel-Bot"
          git config --global user.email "bot@github.com"

          # 1. تصفير الداتا
          echo "[]" > public/assets/data.json

          # 2. مسح ملفات الصوت
          rm -f public/assets/Elevsound/*.mp3 || echo "No audio files found"

          # 3. تجهيز الرفع
          git add -f output/video.mp4
          git add public/assets/data.json
          git add public/assets/Elevsound/*.mp3 || echo "Nothing to add"

          # 4. الرفع مع تجاوز التشغيل التلقائي
          git commit -m "Video Generated, Audio Cleaned & Data Reset [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reel-output-${{ github.run_number }}
          path: output/video.mp4
          retention-days: 7
          

name: 🎬 Render & Push Reel

on:
  push:
    branches:
      - main
    paths:
      - 'public/assets/data.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # عشان الـ Push يتم بسلاسة

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Remotion Browser
        run: npx remotion browser install

      - name: Render video
        run: |
          mkdir -p output
          
          # التأكد من وجود بيانات للريندر
          SCENE_COUNT=$(jq 'if type == "array" then length else .scenes | length end' public/assets/data.json)
          if [ "$SCENE_COUNT" == "0" ] || [ "$SCENE_COUNT" == "null" ]; then
            echo "No scenes found. Skipping..."
            exit 1
          fi

          npx remotion render \
            src/index.ts \
            ReelAutomationScene \
            output/video.mp4 \
            --log=verbose

      - name: Commit & Push Video to Repo
        run: |
          git config --global user.name "FlutterByMousa-Bot"
          git config --global user.email "bot@github.com"

          # 1. سحب آخر التعديلات عشان نتجنب الـ Rejected error
          git pull origin main --rebase

          # 2. إضافة الفيديو (Force)
          git add -f output/video.mp4

          # 3. تصفير الداتا وحذف الصوتيات
          echo "[]" > public/assets/data.json
          rm -f public/assets/Elevsound/*.mp3 || true
          
          git add public/assets/data.json
          git add -u public/assets/Elevsound/ || true

          # 4. عمل الكوميت والرفع
          git commit -m "🚀 New Reel Generated: output/video.mp4 [skip ci]" || echo "No changes to commit"
          git push origin main
          
      - name: Upload as Artifact (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: video-file
          path: output/video.mp4
          
